services:
  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"

  mysql:
    image: mysql:8
    command: --max-connections=500
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: wschat
    ports:
      - "3306:3306"
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  ws-server-1:
    build: ./server
    environment:
      SERVER_ID: ws-server-1
      PORT: 8080
      NATS_URL: nats://nats:4222
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: rootpass
      MYSQL_DATABASE: wschat
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    depends_on:
      mysql:
        condition: service_healthy
      nats:
        condition: service_started

  ws-server-2:
    build: ./server
    environment:
      SERVER_ID: ws-server-2
      PORT: 8080
      NATS_URL: nats://nats:4222
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: rootpass
      MYSQL_DATABASE: wschat
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    depends_on:
      mysql:
        condition: service_healthy
      nats:
        condition: service_started

  ws-server-3:
    build: ./server
    environment:
      SERVER_ID: ws-server-3
      PORT: 8080
      NATS_URL: nats://nats:4222
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: rootpass
      MYSQL_DATABASE: wschat
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    depends_on:
      mysql:
        condition: service_healthy
      nats:
        condition: service_started

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./client:/usr/share/nginx/html
    depends_on:
      - ws-server-1
      - ws-server-2
      - ws-server-3

  load-test:
    build: ./scripts
    environment:
      WS_URL: ws://nginx/ws
      TOTAL_CONNECTIONS: 10000
      RAMP_RATE: 100
      MESSAGE_INTERVAL_MS: 2000
      TEST_DURATION_SEC: 60
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    depends_on:
      - nginx
    profiles:
      - test
